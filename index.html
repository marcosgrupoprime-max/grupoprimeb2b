<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Envios | Grupo Prime B2B</title>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-layout">
        <div class="step-container">
            <div class="container main-card">
                <div class="header-section">
                    <h1>Consultar dados do meu pedido</h1>
                </div>
                <p class="step-instruction">Digite o número da sua ordem de compra ou o número do pedido.</p>

                <div class="search-box">
                    <label class="sr-only" for="numeroBusca">Número da ordem ou pedido</label>
                    <input type="text" id="numeroBusca" placeholder="Ex: 19767 4508924942 20269 (busque vários separados por espaço)" autocomplete="off">
                    <button class="btn-primary" id="btnBuscar" type="button">Buscar informações</button>
                </div>

                <div id="resultados" class="resultados" aria-live="polite"></div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <a href="https://grupoprimeb2b.com.br/Signemails/TUTORIAL%20PARA%20RASTREIO%20DE%20PEDIDOS%20PDF.pdf" target="_blank" class="tutorial-btn-small">
            Problemas para rastrear? <strong>Baixe nosso tutorial</strong>
        </a>
        <a href="https://grupoprimeb2b.com.br/">
            <img src="https://iili.io/K9WdnCG.md.png" alt="Logo Grupo Prime B2B">
        </a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
